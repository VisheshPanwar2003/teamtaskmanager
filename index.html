<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeamTaskManager</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:
      radial-gradient(circle at top left,#1e3a8a 0%,transparent 35%),
      radial-gradient(circle at bottom right,#6d28d9 0%,transparent 35%),
      #020617;
      position:relative;
    }

    .glow{
      position:absolute;
      width:400px;
      height:400px;
      border-radius:50%;
      filter:blur(120px);
      opacity:.25;
      animation:float 8s ease-in-out infinite;
    }

    .glow1{
      background:#2563eb;
      top:-120px;
      left:-100px;
    }

    .glow2{
      background:#7c3aed;
      bottom:-120px;
      right:-100px;
      animation-delay:2s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-20px);
      }
    }

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:550px;
      padding:65px 50px;
      text-align:center;
      border-radius:32px;

      background:rgba(255,255,255,0.06);

      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(18px);

      box-shadow:
      0 20px 60px rgba(0,0,0,0.45),
      inset 0 1px 1px rgba(255,255,255,0.08);

      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      font-size:72px;
      margin-bottom:15px;
      animation:bounce 3s infinite;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-8px);
      }
    }

    h1{
      font-size:52px;
      font-weight:800;
      margin-bottom:18px;
      letter-spacing:-1px;

      background:linear-gradient(to right,#ffffff,#a5b4fc);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p{
      color:#cbd5e1;
      font-size:18px;
      line-height:1.8;
      margin-bottom:35px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:12px;

      padding:18px 38px;

      border-radius:18px;

      text-decoration:none;

      background:linear-gradient(
      135deg,
      #3b82f6,
      #7c3aed
      );

      color:white;

      font-size:18px;
      font-weight:600;

      transition:0.35s ease;

      box-shadow:
      0 12px 30px rgba(124,58,237,0.35);
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.03);

      box-shadow:
      0 18px 40px rgba(124,58,237,0.5);
    }

    .redirect-text{
      margin-top:25px;
      color:#94a3b8;
      font-size:14px;
    }

    .loader{
      width:42px;
      height:42px;
      border-radius:50%;
      border:4px solid rgba(255,255,255,0.15);
      border-top:4px solid #8b5cf6;
      margin:25px auto 0;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    @media(max-width:600px){

      .container{
        padding:50px 30px;
      }

      h1{
        font-size:40px;
      }

      p{
        font-size:16px;
      }

      .logo{
        font-size:58px;
      }
    }

  </style>

  <!-- Auto Redirect -->

  <script>

    setTimeout(() => {

      window.location.href =
      "https://teamtaskmanager-production-d1a6.up.railway.app/login";

    }, 1000);

  </script>

</head>

<body>

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="container">

    <div class="logo">🚀</div>

    <h1>TeamTaskManager</h1>

    <p>
      Organize projects, manage tasks, and collaborate with your team in one modern productivity workspace.
    </p>

    <a
      class="btn"
      href="https://teamtaskmanager-production-d1a6.up.railway.app/login"
    >
      Open Workspace →
    </a>

  </div>

</body>
</html>
